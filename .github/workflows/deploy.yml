name: Deploy to GitHub Pages

on:
  push:
    branches: ["Development_Updates"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Create config file with API keys from Secrets
        run: |
          echo "// This file is auto-generated during deployment" > config.js
          echo "// DO NOT EDIT MANUALLY" >> config.js
          echo "" >> config.js
          echo "window.ENV = {" >> config.js
          echo "  GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'," >> config.js
          echo "  SUPABASE_URL: '${{ secrets.SUPABASE_URL }}'," >> config.js
          echo "  SUPABASE_ANON_KEY: '${{ secrets.SUPABASE_ANON_KEY }}'" >> config.js
          echo "};" >> config.js
          
          echo "✅ Config file created with secrets (keys hidden in logs)"
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
