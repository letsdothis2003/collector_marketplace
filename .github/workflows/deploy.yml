name: Inject Secrets and Deploy

on:
  push:
    branches: ["**"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject Gemini API Key
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_KEY" ]; then
            echo "ERROR: GEMINI_API_KEY secret is not set in GitHub Settings."
            echo "Go to Settings > Secrets and variables > Actions to add it."
            exit 1
          fi
          
          # Create the config.js file that script.js expects
          # This mimics your local setup and keeps the key out of source control.
          echo "window.CONFIG = { GEMINI_API_KEY: '$GEMINI_KEY' };" > config.js
          
          echo "Successfully generated config.js for deployment."

      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4