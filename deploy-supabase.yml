name: Deploy Supabase Edge Function

on:
  push:
    branches:
      - branch4

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Supabase CLI
        uses: supabase/setup-supabase@v1
        with:
          version: latest

      - name: Deploy Edge Function
        run: supabase functions deploy gemini-proxy --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}