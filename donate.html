<!-- ====== DONATE PAGE ====== -->
<section class="page" id="page-donate">
  <div class="donate-container" style="max-width: 1000px;">
    <div class="about-hero">
      <h1>Give Back</h1>
      <p>Find local charities and donation centers for your pre-loved items.</p>
    </div>
    <div class="charity-finder-panel" style="background: var(--bg-card); padding: 24px; border-radius: var(--radius-lg); border: 1px solid var(--border);">
      <h3 style="font-family: 'Orbitron', sans-serif; color: var(--neon); margin-bottom: 12px;">AI Charity Finder</h3>
      <p style="color: var(--text-secondary); margin-bottom: 20px;">Enter your city or zip code to find top-rated donation centers near you.</p>
      <div class="location-input-group" style="display: flex; gap: 12px; margin-bottom: 20px;">
        <input type="text" id="charity-location-input" class="form-input" placeholder="e.g., Brooklyn, NY or 90210">
        <button id="charity-search-btn" class="btn btn-primary" onclick="findLocalCharities()">FIND CHARITIES</button>
      </div>
      <div id="charity-results-container" style="margin-top: 24px;"></div>
      <div id="charity-map" style="height: 400px; margin-top: 24px; border-radius: var(--radius); display: none;"></div>
    </div>
  </div>
</section>
