
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List an Item | Obtainum</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="nav-root"></div>

  <main>
    <div class="container" style="max-width:680px;padding-top:2rem;padding-bottom:4rem">
      <div id="sell-content">
        <div class="page-header">
          <h1>List an Item</h1>
          <p class="page-sub">Your listing will be automatically verified against real-time MSRP data to maintain fair pricing.</p>
        </div>

        <form class="glass" style="padding:2rem" onsubmit="handleSellSubmit(event)" id="sell-form">
          <div class="form-group">
            <label class="input-label" for="title">Item Title *</label>
            <input class="input" id="title" placeholder="e.g. Voyager Class Optimus Prime (Transformers)" required>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
            <div class="form-group">
              <label class="input-label" for="price">Your Price ($) *</label>
              <input class="input" id="price" type="number" min="0" step="0.01" placeholder="85.00" required oninput="checkMarkup()">
            </div>
            <div class="form-group">
              <label class="input-label" for="msrp">MSRP ($) *</label>
              <input class="input" id="msrp" type="number" min="0" step="0.01" placeholder="34.99" required oninput="checkMarkup()">
            </div>
          </div>

          <div class="meter-container" id="fairness-meter-wrap" style="display:none">
            <div class="input-label">Anti-Scalp Fairness Meter</div>
            <div class="meter-bar">
              <div id="meter-fill" class="meter-fill" style="width: 0%"></div>
            </div>
            <div class="meter-labels"><span>Fair</span><span>MSRP</span><span>Scalped</span></div>
          </div>
          <div id="markup-warning" aria-live="polite" style="margin-bottom: 1.25rem"></div>

          <div class="form-group">
            <label class="input-label" for="location">Item Location *</label>
            <input class="input" id="location" placeholder="e.g., 'Brooklyn, NY'" required>
          </div>

          <div class="form-group">
            <label class="input-label">Fulfillment Options *</label>
            <div class="checkbox-group">
              <label><input type="checkbox" id="shipping" name="fulfillment" value="shipping"> Shipping Available</label>
              <label><input type="checkbox" id="local_pickup" name="fulfillment" value="local_pickup"> Local Pickup</label>
              <label><input type="checkbox" id="trade" name="fulfillment" value="trade"> Open to Trades</label>
            </div>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
            <div class="form-group">
              <label class="input-label" for="category">Category *</label>
              <select class="input" id="category">
                <option>Toys</option>
                <option>Electronics</option>
                <option>Clothing</option>
                <option>Shoes</option>
                <option>Trading Cards</option>
                <option>Other</option>
              </select>
            </div>
            <div class="form-group">
              <label class="input-label" for="condition">Condition *</label>
              <select class="input" id="condition">
                <option>New</option>
                <option>Like New</option>
                <option>Good</option>
                <option>Fair</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="input-label" for="description">Description *</label>
            <textarea class="input" id="description" rows="4" placeholder="Describe the item's condition, contents, any missing pieces…" required></textarea>
          </div>

          <div class="form-group">
            <label class="input-label" for="imageFile">Item Image</label>
            <input class="input" id="imageFile" type="file" accept="image/*">
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg" id="submit-btn">Publish Listing</button>
        </form>
      </div>
    </div>
  </main>

  <div id="footer-root"></div>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/sell.js"></script>
</body>
</html>
