<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop | Obtainum</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>
  <div id="nav-root"></div>

  <main>
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">Shop</h1>
        <p class="page-sub" id="listing-count">Loading listings…</p>
      </div>

      <div class="shop-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="glass">
                <div class="sidebar-header">
                    <h3 class="sidebar-title">Filters</h3>
                    <button class="btn btn-text btn-sm" onclick="clearFilters()">Clear All</button>
                </div>
            </div>
            <div class="glass">
                <div class="sidebar-header">
                    <h3 class="sidebar-title">Category</h3>
                </div>
                <div id="category-filters"></div>
            </div>
            <div class="glass">
                <div class="sidebar-header">
                    <h3 class="sidebar-title">Fulfillment</h3>
                </div>
                <div id="fulfillment-filters"></div>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="shop-main">
          <div class="shop-toolbar">
            <div class="search-wrap">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input type="search" id="shop-search" class="input" placeholder="Search listings…">
            </div>
            <select id="shop-sort" class="input">
                <option value="newest">Sort: Newest</option>
                <option value="price_asc">Price: Low to High</option>
                <option value="price_desc">Price: High to Low</option>
            </select>
          </div>

          <div id="shop-grid" class="listing-grid"></div>
          <div id="no-results" class="glass" style="display:none; text-align:center; padding: 2rem;">
              <h3>No Listings Found</h3>
              <p>Try adjusting your search or filter criteria.</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-root"></div>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/shop.js"></script>
</body>
</html>
