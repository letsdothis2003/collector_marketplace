<!-- ====== CONTACT PAGE ====== -->
<section class="page" id="page-contact">
  <div class="contact-container">
    <div class="contact-hero">
      <h1>Get In Touch</h1>
      <p>We're here to help. Use the form below to send us a message.</p>
    </div>
    <div class="contact-form" style="max-width: 600px; margin: 0 auto;">
      <h3>Send us a Message</h3>
      <form onsubmit="submitBugReport(event)">
        <input type="hidden" name="from_name" value="Contact Form">
        <div class="form-group">
          <label for="contact-email" class="form-label">Your Email</label>
          <input type="email" id="contact-email" name="email" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="contact-subject" class="form-label">Subject</label>
          <input type="text" id="contact-subject" name="subject" class="form-input" placeholder="Question about a listing" required>
        </div>
        <div class="form-group">
          <label for="contact-message" class="form-label">Message</label>
          <textarea id="contact-message" name="message" class="form-input" rows="5" placeholder="How can we help?" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-full">SEND MESSAGE</button>
      </form>
    </div>
  </div>
</section>
