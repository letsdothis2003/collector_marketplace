<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Obtainum</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4a2 2 0 012 2v6a2 2 0 01-2 2H6a2 2 0 01-2-2v-1"/></svg>
        </div>
        OBTAINUM
      </a>

      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>

      <div class="nav-right">
        <div class="search-wrap" id="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="search" id="nav-search" placeholder="Search collectibles..." autocomplete="off">
          <div class="search-dropdown" id="search-dropdown" style="display:none"></div>
        </div>

        <a href="cart.html" class="cart-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.95-1.55L23 6H6"/></svg>
          <span class="cart-badge" id="cart-badge" style="display:none">0</span>
        </a>

        <a href="sell.html" class="btn btn-primary btn-sm">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v8m-4-4h8"/></svg>
          List Item
        </a>
        <a href="profile.html" class="btn btn-outline btn-sm" id="my-listings-link" style="display:none">My Listings</a>

        <button class="hamburger" id="hamburger" onclick="toggleMobile()">
          <svg id="ham-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
      </div>
    </div>

    <div class="mobile-menu" id="mobile-menu">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <div class="search-wrap" style="display:block;margin-top:.75rem">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="search" id="mobile-search" placeholder="Search collectibles..." class="input" style="padding-left:2.25rem;font-size:.8rem">
      </div>
    </div>
  </nav>
  <main>
    <div class="container" style="padding-top:2rem;padding-bottom:4rem;max-width:760px">
      <div class="page-header">
        <h1 class="page-title">Your Cart</h1>
        <p class="page-sub" id="cart-sub">Loading…</p>
      </div>
      <div id="cart-content"></div>
    </div>
  </main>
  <div id="footer-root"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/assistant.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
