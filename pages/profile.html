<!-- PROFILE PAGE -->
<div class="profile-container">
  <div class="profile-banner">
    <div class="profile-avatar-lg" id="profile-avatar-lg">?</div>
    <div class="profile-info">
      <div class="profile-username" id="profile-username">LOADING...</div>
      <div class="profile-email" id="profile-email"></div>
      <p class="profile-bio" id="profile-bio"></p>
      <div class="profile-location" id="profile-location"></div>
    </div>
    <div class="profile-stats">
      <div class="stat-item"><div class="stat-value" id="stat-listings">0</div><div class="stat-label">Listings</div></div>
      <div class="stat-item"><div class="stat-value" id="stat-views">0</div><div class="stat-label">Views</div></div>
      <div class="stat-item"><div class="stat-value" id="stat-favorites">0</div><div class="stat-label">Favorites</div></div>
      <div class="stat-item"><div class="stat-value" id="stat-sold">0</div><div class="stat-label">Sold</div></div>
    </div>
    <button class="btn btn-outline btn-sm" id="edit-profile-btn">✏️ Edit Profile</button>
  </div>
  <div class="profile-tabs">
    <button class="profile-tab active" data-ptab="my-listings">Active Listings</button>
    <button class="profile-tab" data-ptab="sold">Sold Items</button>
    <button class="profile-tab" data-ptab="settings">Settings</button>
  </div>
  <div id="ptab-my-listings"><div class="listings-grid" id="profile-listings-grid"></div></div>
  <div id="ptab-sold" class="hidden"><div class="listings-grid" id="profile-sold-grid"></div></div>
  <div id="ptab-settings" class="hidden">
    <form class="create-form" id="profile-settings-form" style="max-width:600px;">
      <div class="form-group">
        <label class="form-label">👤 Username *</label>
        <input class="form-input" id="s-username" type="text" placeholder="Your username" required minlength="3" maxlength="30" />
        <small style="color:var(--text-muted);font-size:0.7rem;">Letters, numbers, and underscores only</small>
      </div>
      <div class="form-group">
        <label class="form-label">📝 Bio</label>
        <textarea class="form-input" id="s-bio" rows="3" placeholder="Tell buyers about yourself..." maxlength="500"></textarea>
        <small style="color:var(--text-muted);font-size:0.7rem;">Max 500 characters</small>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">📍 Location</label>
          <input class="form-input" id="s-location" type="text" placeholder="City, State" />
        </div>
        <div class="form-group">
          <label class="form-label">📞 Phone Number</label>
          <input class="form-input" id="s-phone" type="tel" placeholder="+1 555 000 0000" />
        </div>
      </div>
      <div id="profile-save-error" class="auth-error"></div>
      <div style="display:flex;gap:12px;margin-top:8px;">
        <button type="submit" class="btn btn-primary">💾 SAVE PROFILE</button>
        <button type="button" class="btn btn-danger" id="signout-btn">🚪 SIGN OUT</button>
      </div>
    </form>
  </div>
</div>
