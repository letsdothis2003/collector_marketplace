<!-- CREATE/EDIT LISTING PAGE -->
<div class="create-container">
  <h1 class="page-title" id="create-page-title">+ Create New Listing</h1>
  <div id="create-auth-notice" class="empty-state hidden">
    <div class="empty-icon">🔒</div>
    <div class="empty-title">LOGIN REQUIRED</div>
    <div class="empty-sub">You need to be logged in to create listings.</div>
    <br />
    <button class="btn btn-primary" id="create-login-btn">Login / Register</button>
  </div>
  <form class="create-form" id="create-form">
    <div class="form-group">
      <label class="form-label">📸 Images (up to 10)</label>
      <div id="existing-images-section" class="hidden">
        <div class="form-label" style="margin-bottom:6px;">Current Images</div>
        <div class="image-preview-grid" id="existing-image-grid"></div>
      </div>
      <div class="image-upload-zone" id="upload-zone">
        <div class="upload-icon">📷</div>
        <div class="upload-text">Drop images here or <span>click to upload</span></div>
        <input type="file" class="upload-input" id="image-input" multiple accept="image/*" />
      </div>
      <div class="image-preview-grid" id="image-preview-grid"></div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="c-name">Item Name *</label>
        <input class="form-input" id="c-name" type="text" placeholder="e.g. Optimus Prime G1 Figure" required maxlength="100" />
      </div>
      <div class="form-group">
        <label class="form-label" for="c-category">Category *</label>
        <select class="form-input" id="c-category" required>
          <option value="">Select category...</option>
        </select>
      </div>
    </div>
    <div class="form-group" id="subcategory-group" style="display:none;">
      <label class="form-label" for="c-subcategory">Subcategory</label>
      <select class="form-input" id="c-subcategory"><option value="">Select subcategory...</option></select>
    </div>
    <div class="form-group">
      <label class="form-label" for="c-desc">Description *</label>
      <textarea class="form-input" id="c-desc" placeholder="Describe your item — condition, history, what's included..." required minlength="10" maxlength="2000" rows="5"></textarea>
      <div style="font-size:0.75rem;color:var(--text-muted);text-align:right;" id="desc-char-count">0 / 2000</div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="c-price">Your Price ($) *</label>
        <input class="form-input" id="c-price" type="number" placeholder="0.00" min="0" step="0.01" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="c-msrp">MSRP / Retail Price ($)</label>
        <input class="form-input" id="c-msrp" type="number" placeholder="0.00" min="0" step="0.01" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="c-condition">Condition *</label>
        <select class="form-input" id="c-condition" required>
          <option value="">Select condition...</option>
          <option value="new">New</option><option value="like-new">Like New</option>
          <option value="good">Good</option><option value="fair">Fair</option><option value="poor">Poor</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="c-type">Listing Type *</label>
        <select class="form-input" id="c-type" required>
          <option value="buy-now">Buy Now</option>
          <option value="offers">Accepting Offers</option>
          <option value="auction">Auction</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="c-shipping">Shipping *</label>
        <select class="form-input" id="c-shipping" required>
          <option value="paid">Paid Shipping</option><option value="free">Free Shipping</option>
          <option value="local">Local Delivery</option><option value="pickup">Pickup Only</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="c-location">Location</label>
        <input class="form-input" id="c-location" type="text" placeholder="City, State" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Payment Methods Accepted</label>
      <div class="payment-methods-grid" id="payment-methods-grid">
        <label><input type="checkbox" name="payment" value="cash" checked /> Cash</label>
        <label><input type="checkbox" name="payment" value="card" /> Card</label>
        <label><input type="checkbox" name="payment" value="paypal" /> PayPal</label>
        <label><input type="checkbox" name="payment" value="venmo" /> Venmo</label>
        <label><input type="checkbox" name="payment" value="crypto" /> Crypto</label>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" for="c-tags">Tags (comma separated)</label>
      <input class="form-input" id="c-tags" type="text" placeholder="vintage, sealed, rare" />
    </div>
    <div id="create-error" class="auth-error"></div>
    <div class="form-row">
      <button type="submit" class="btn btn-primary btn-lg" id="create-submit">PUBLISH LISTING</button>
      <button type="button" class="btn btn-ghost btn-lg" id="create-cancel" style="display:none;">CANCEL</button>
    </div>
  </form>
</div>
