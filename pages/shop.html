<!-- SHOP PAGE - Marketplace listings -->
<div class="shop-layout">
  <aside class="sidebar" id="sidebar">
    <h3 class="sidebar-title">⚙️ FILTERS</h3>
    <div class="filter-section">
      <div class="filter-title">Category</div>
      <div class="filter-chips" id="category-chips"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title">Condition</div>
      <div class="filter-chips" id="condition-chips"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title">Listing Type</div>
      <div class="filter-chips" id="type-chips"></div>
    </div>
    <div class="filter-section">
      <div class="filter-title">Price Range</div>
      <div class="price-range">
        <input type="number" id="price-min" placeholder="Min" min="0" />
        <span>to</span>
        <input type="number" id="price-max" placeholder="Max" min="0" />
      </div>
      <input type="range" id="price-slider" min="0" max="2000" value="2000" />
      <div style="font-size: 0.78rem; color: var(--text-muted); margin-top: 4px;">Up to <span id="price-slider-val">$2000</span></div>
    </div>
    <div class="filter-section">
      <div class="filter-title">Quality</div>
      <div class="source-toggle">
        <label class="source-item">
          <input type="checkbox" id="fair-only" />
          <span>AI Fair Price Only</span>
        </label>
        <label class="source-item">
          <input type="checkbox" id="featured-only" />
          <span>Featured Only</span>
        </label>
      </div>
    </div>
    <button class="btn btn-ghost w-full" id="reset-filters-btn">RESET FILTERS</button>
  </aside>

  <div class="shop-main">
    <div class="shop-header">
      <div class="results-info">
        <span class="results-count" id="results-count">—</span> listings found
      </div>
      <button class="btn btn-outline btn-sm" id="mobile-filter-toggle" style="display: none;">⚙️ Filters</button>
      <select class="sort-select" id="sort-select">
        <option value="newest">Newest First</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="popular">Most Viewed</option>
        <option value="favorites">Most Favorited</option>
      </select>
    </div>
    <div class="listings-grid" id="listings-grid"></div>
  </div>
</div>
