<!-- MESSAGES PAGE -->
<div class="chat-container">
  <aside class="chat-sidebar">
    <div class="chat-header">📬 Conversations</div>
    <div id="conversationList" class="convo-list"></div>
  </aside>
  <main class="chat-window">
    <div id="activeChatHeader" class="active-chat-header">Select a conversation...</div>
    <div id="chatThread" class="chat-thread"></div>
    <form id="chatForm" class="chat-input-area" style="display:none;">
      <label for="chatImageInput" class="attach-btn">📎</label>
      <input type="file" id="chatImageInput" accept="image/*" hidden>
      <input type="text" id="chatMessageInput" placeholder="Write a message..." maxlength="1000">
      <button type="submit" class="btn btn-primary">SEND</button>
    </form>
    <div id="messages-login-notice" class="messages-login-notice hidden" style="text-align:center;padding:40px;background:var(--bg-2);">
      <p>💬 <strong>Login to chat with sellers</strong> — Ask questions, negotiate, and track conversations.</p>
      <button class="btn btn-primary" id="messages-login-btn">Login / Register</button>
    </div>
  </main>
</div>
