<!-- CONTACT PAGE -->
<div class="contact-container animate-slide-up">
  <div class="contact-hero">
    <h1>📧 Contact Us</h1>
    <p>We'd love to hear from you!</p>
  </div>
  <div class="contact-grid">
    <div class="contact-info">
      <div class="contact-method">
        <span class="contact-icon">✉️</span>
        <div>
          <h3>Email</h3>
          <p>support@obtainum.com</p>
          <small>Response within 24-48 hours</small>
        </div>
      </div>
      <div class="contact-method">
        <span class="contact-icon">💬</span>
        <div>
          <h3>Discord</h3>
          <p>Join our community server</p>
          <button class="btn btn-outline btn-sm" id="discord-link">Join Discord →</button>
        </div>
      </div>
      <div class="contact-method">
        <span class="contact-icon">🐦</span>
        <div>
          <h3>Twitter / X</h3>
          <p>@obtainum</p>
        </div>
      </div>
      <div class="contact-method">
        <span class="contact-icon">📱</span>
        <div>
          <h3>Report an Issue</h3>
          <p>Found a bug? Let us know!</p>
          <button class="btn btn-outline btn-sm" id="report-bug-btn">Report Bug →</button>
        </div>
      </div>
    </div>
    <div class="contact-form">
      <h3>Send us a message</h3>
      <form id="contact-form">
        <div class="form-group">
          <input type="text" id="contact-name" placeholder="Your Name" required>
        </div>
        <div class="form-group">
          <input type="email" id="contact-email" placeholder="Your Email" required>
        </div>
        <div class="form-group">
          <select id="contact-subject">
            <option value="general">General Inquiry</option>
            <option value="support">Technical Support</option>
            <option value="report">Report a Listing</option>
            <option value="partnership">Partnership Opportunity</option>
          </select>
        </div>
        <div class="form-group">
          <textarea id="contact-message" rows="5" placeholder="Your message..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-full">Send Message</button>
      </form>
    </div>
  </div>
</div>
