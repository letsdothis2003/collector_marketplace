<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obtainum | Fair Prices for True Collectors</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="nav-root"></div>

  <main>
    <!-- Hero -->
    <section class="hero">
      <div class="container">
        <div class="hero-tag">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Anti-Scalp Technology
        </div>
        <h1>Fair Prices for<br><span>True Collectors.</span></h1>
        <p>The only marketplace built for collectors. Trade, buy, and sell marketplace-only listings without Amazon or eBay-style sourcing.</p>
        <div class="hero-actions">
          <a href="shop.html" class="btn btn-primary btn-lg">
            Explore the Shop
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </a>
          <a href="sell.html" class="btn btn-outline btn-lg">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4a2 2 0 012 2v6a2 2 0 01-2 2H6a2 2 0 01-2-2v-1"/></svg>
            List an Item
          </a>
        </div>
      </div>
    </section>

    <!-- Stats -->
    <div class="stats-bar" id="stats-bar">
      <div class="stat-item"><div class="stat-num skeleton" style="height:2rem;width:60px;margin:0 auto .25rem">&#8203;</div><div class="stat-label">Total Listings</div></div>
      <div class="stat-item"><div class="stat-num skeleton" style="height:2rem;width:60px;margin:0 auto .25rem">&#8203;</div><div class="stat-label">Fair Deals</div></div>
      <div class="stat-item"><div class="stat-num skeleton" style="height:2rem;width:60px;margin:0 auto .25rem">&#8203;</div><div class="stat-label">Scalped Items</div></div>
      <div class="stat-item"><div class="stat-num" style="color:var(--primary)">5</div><div class="stat-label">Categories</div></div>
    </div>

    <!-- Source filter -->
    <div class="container">
      <div class="source-tabs" id="source-tabs">
        <button class="source-tab active" data-source="Marketplace">Marketplace Only</button>
      </div>

      <!-- Featured grid -->
      <div id="featured-grid" class="listing-grid">
        <!-- skeleton -->
        <div class="listing-card" style="pointer-events:none"><div style="aspect-ratio:4/3" class="skeleton"></div><div style="padding:1rem"><div class="skeleton" style="height:14px;margin-bottom:.5rem"></div><div class="skeleton" style="height:14px;width:60%;margin-bottom:.5rem"></div></div></div>
        <div class="listing-card" style="pointer-events:none"><div style="aspect-ratio:4/3" class="skeleton"></div><div style="padding:1rem"><div class="skeleton" style="height:14px;margin-bottom:.5rem"></div><div class="skeleton" style="height:14px;width:60%;margin-bottom:.5rem"></div></div></div>
        <div class="listing-card" style="pointer-events:none"><div style="aspect-ratio:4/3" class="skeleton"></div><div style="padding:1rem"><div class="skeleton" style="height:14px;margin-bottom:.5rem"></div><div class="skeleton" style="height:14px;width:60%;margin-bottom:.5rem"></div></div></div>
      </div>
    </div>
    <div style="height:4rem"></div>
  </main>
  <div id="footer-root"></div>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/home.js"></script>
  <script src="js/main.js"></script>
  <script src="js/assistant.js"></script>
</body>
</html>
