<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBTAINUM | Collector Marketplace</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <nav class="navbar">
    <div class="logo">OBTAINUM</div>
    <div class="nav-actions">
      <input type="text" id="searchInput" placeholder="Search collectibles...">
      <button id="authBtn">Login</button>
      <button id="openSellModal" class="btn-primary">Sell Item</button>
    </div>
  </nav>

  <div class="app-layout">
    <aside class="sidebar">
      <h3>Filters</h3>
      <div class="filter-group">
        <label>Category</label>
        <select id="categoryFilter">
          <option value="all">All Items</option>
          <option value="Transformers">Transformers</option>
          <option value="Marvel">Marvel</option>
          <option value="Electronics">Electronics</option>
        </select>
      </div>
    </aside>

    <main class="content">
      <div id="productGrid" class="grid">
        </div>
    </main>
  </div>

  <div id="sellModal" class="modal">
    <div class="modal-content">
      <h2>List New Item</h2>
      <form id="sellForm">
        <input type="text" id="itemTitle" placeholder="Item Name (e.g. SS-38 Optimus)" required>
        <select id="itemCategory">
          <option value="Transformers">Transformers</option>
          <option value="Marvel">Marvel</option>
          <option value="Electronics">Electronics</option>
          <option value="Other">Other</option>
        </select>
        <div style="display: flex; gap: 10px;">
          <input type="number" id="itemPrice" placeholder="Price ($)" step="0.01" required>
          <input type="number" id="itemMsrp" placeholder="MSRP ($)" step="0.01" required>
        </div>
        <select id="itemCondition">
          <option value="new">New</option>
          <option value="like-new">Like New</option>
          <option value="good">Good</option>
          <option value="fair">Fair</option>
        </select>
        <textarea id="itemDescription" placeholder="Item details (min 10 chars)..." required></textarea>
        <div class="modal-actions">
          <button type="submit" id="submitListing" class="btn-primary">Post Listing</button>
          <button type="button" id="closeModal">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
