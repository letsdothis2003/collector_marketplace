<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBTAINUM — Next-Gen Marketplace</title>
  <meta name="description" content="OBTAINUM — The techno marketplace for collectors and hobbyists. Fair prices, no scalping." />
  
  <!-- Preload critical assets -->
  <link rel="preload" href="css/main.css" as="style" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  
  <!-- Main CSS -->
  <link rel="stylesheet" href="css/main.css" />
  
  <!-- Dynamic page CSS will be loaded via JS -->
  
  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@google/generative-ai@0.1.3/dist/index.min.js"></script>
  
  <!-- Main application script (type="module" for ES modules) -->
  <script type="module" src="js/main.js"></script>
</head>
<body>

  <!-- Error Banner -->
  <div id="error-banner">⚠️ OBTAINUM IS EXPERIENCING ISSUES — PLEASE WAIT WHILE WE RESTORE SERVICE</div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- ===================== HEADER ===================== -->
  <header id="header">
    <div class="logo glitch" data-text="OBTAINUM" id="logo">OBTAINUM</div>

    <div class="header-search">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Search collectibles, electronics, gear..." />
    </div>

    <!-- PUBLIC NAVIGATION (Always visible) -->
    <nav class="nav-menu nav-public">
      <button class="nav-btn" data-page="shop">🛒 SHOP</button>
      <button class="nav-btn" data-page="about">📖 ABOUT</button>
      <button class="nav-btn" data-page="contact">📧 CONTACT</button>
    </nav>

    <!-- PRIVATE NAVIGATION (Only visible when logged in) -->
    <nav class="nav-menu nav-private hidden">
      <button class="nav-btn" data-page="create">+ CREATE</button>
      <button class="nav-btn" data-page="wishlist">❤️ WISHLIST</button>
      <button class="nav-btn" data-page="profile">⚙️ PROFILE</button>
      <button class="nav-btn" data-page="assistant">🤖 ASSISTANT</button>
      <button class="nav-btn" data-page="messages">💬 MESSAGES</button>
      <button class="nav-btn" data-page="donate">🎁 DONATE</button>
    </nav>

    <div class="header-actions">
      <div id="auth-btn-wrap">
        <button class="btn btn-primary btn-sm" id="login-btn">LOGIN</button>
      </div>
      <div id="user-avatar-wrap" class="hidden">
        <div class="header-avatar" id="header-avatar">?</div>
      </div>
      <div class="theme-wrapper">
        <button class="theme-toggle" id="theme-toggle"></button>
        <div class="theme-toggle-label" id="theme-label">DARK</div>
      </div>
    </div>

    <button class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- Mobile Nav Drawer -->
  <nav class="mobile-nav" id="mobile-nav"></nav>

  <!-- ===================== MAIN CONTENT ===================== -->
  <main id="app">
    <div class="loading-spinner" id="page-loader">
      <div class="spinner spinner-lg"></div>
      <p>Loading...</p>
    </div>
    <div id="page-content"></div>
  </main>

  <!-- ===================== MODALS ===================== -->
  
  <!-- Auth Modal -->
  <div class="modal-overlay" id="auth-modal" onclick="closeOnOverlay(event, 'auth-modal')">
    <div class="modal">
      <button class="modal-close" onclick="closeModal('auth-modal')">&times;</button>
      <div class="modal-logo">OBTAINUM</div>
      <div class="modal-tagline">Enter the marketplace</div>
      <div class="modal-tabs">
        <button class="modal-tab active" data-tab="login">LOGIN</button>
        <button class="modal-tab" data-tab="register">REGISTER</button>
      </div>
      <div id="auth-login">
        <form id="login-form">
          <button type="button" class="btn btn-outline w-full" id="google-login-btn">CONTINUE WITH GOOGLE</button>
          <div class="auth-divider"><span>OR</span></div>
          <input class="form-input" id="login-email" type="email" placeholder="Email" required>
          <input class="form-input" id="login-pass" type="password" placeholder="Password" required>
          <div id="login-error" class="auth-error"></div>
          <button type="submit" class="btn btn-primary btn-lg w-full">LOGIN</button>
        </form>
      </div>
      <div id="auth-register" class="hidden">
        <form id="register-form">
          <button type="button" class="btn btn-outline w-full" id="google-register-btn">CONTINUE WITH GOOGLE</button>
          <div class="auth-divider"><span>OR</span></div>
          <input class="form-input" id="reg-username" placeholder="Username" required>
          <input class="form-input" id="reg-email" type="email" placeholder="Email" required>
          <input class="form-input" id="reg-pass" type="password" placeholder="Password" required>
          <div id="register-error" class="auth-error"></div>
          <button type="submit" class="btn btn-primary btn-lg w-full">CREATE ACCOUNT</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Route Safety Modal -->
  <div class="modal-overlay" id="route-modal" onclick="closeOnOverlay(event, 'route-modal')">
    <div class="modal" style="max-width:500px;">
      <button class="modal-close" onclick="closeModal('route-modal')">&times;</button>
      <div class="modal-logo" style="font-size:1.1rem;">🗺️ ROUTE & SAFETY ANALYSIS</div>
      <form id="route-form">
        <div class="form-group">
          <label class="form-label">📍 Pickup Location</label>
          <input class="form-input" id="pickup-location" placeholder="Enter address or zip code" required>
        </div>
        <div class="form-group">
          <label class="form-label">🚗 Your Location</label>
          <input class="form-input" id="user-location" placeholder="Enter your address or zip code" required>
          <button type="button" class="btn btn-outline btn-sm" style="margin-top:8px;" id="use-current-location">📍 Use My Current Location</button>
        </div>
        <div class="form-group">
          <label class="form-label">🚗 Transportation Method</label>
          <select class="form-input" id="transport-method">
            <option value="driving">🚗 Driving</option>
            <option value="walking">🚶 Walking</option>
            <option value="transit">🚌 Public Transit</option>
          </select>
        </div>
        <div id="route-result" class="route-result hidden"></div>
        <button type="submit" class="btn btn-primary w-full">🔍 Analyze Route & Safety</button>
      </form>
    </div>
  </div>

  <!-- Report Bug Modal -->
  <div class="modal-overlay" id="report-modal" onclick="closeOnOverlay(event, 'report-modal')">
    <div class="modal" style="max-width:500px;">
      <button class="modal-close" onclick="closeModal('report-modal')">&times;</button>
      <div class="modal-logo" style="font-size:1.1rem;">🐛 Report a Bug</div>
      <form id="bug-form">
        <div class="form-group"><input class="form-input" id="bug-title" placeholder="Bug title" required></div>
        <div class="form-group"><textarea class="form-input" id="bug-description" rows="4" placeholder="Describe the issue..." required></textarea></div>
        <div class="form-group"><input class="form-input" id="bug-url" placeholder="Page URL"></div>
        <button type="submit" class="btn btn-primary w-full">Submit Report</button>
      </form>
    </div>
  </div>

  <!-- Mark Sold Modal -->
  <div class="modal-overlay" id="mark-sold-modal" onclick="closeOnOverlay(event, 'mark-sold-modal')">
    <div class="modal" style="max-width:380px;">
      <button class="modal-close" onclick="closeModal('mark-sold-modal')">&times;</button>
      <div class="modal-logo" style="font-size:1.1rem;">MARK AS SOLD</div>
      <p>This will mark the listing as sold and remove it from the marketplace.</p>
      <input type="hidden" id="mark-sold-listing-id" />
      <button class="btn btn-primary w-full" id="confirm-sold-btn">YES, MARK AS SOLD</button>
      <button class="btn btn-ghost w-full" onclick="closeModal('mark-sold-modal')">CANCEL</button>
    </div>
  </div>

</body>
</html>
