<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obtainum | Anti-Scalp Marketplace</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">

    <nav class="main-nav">
        <div class="nav-container">
            <div class="logo" onclick="router.navigate('home')">Obtainum</div>
            <div class="nav-links">
                <button onclick="router.navigate('home')">Home</button>
                <button onclick="router.navigate('shop')">Shop</button>
                <button onclick="router.navigate('sell')">Sell</button>
                <button onclick="router.navigate('profile')">Profile</button>
                <button id="theme-toggle">🌓</button>
            </div>
        </div>
    </nav>

    <div id="page-container">
        <section id="view-home" class="page-view active">
            <div class="hero">
                <h1>The Collector's <span class="highlight">Fair Price</span> Marketplace</h1>
                <p>Buy and sell without the scalper tax.</p>
                <button class="btn-primary" onclick="router.navigate('shop')">Browse Marketplace</button>
            </div>
        </section>

        <section id="view-shop" class="page-view hidden">
            <div class="shop-shell">
                <aside class="filters">
                    <h3>Refine Market</h3>
                    <label>Condition</label>
                    <select id="filter-condition">
                        <option value="all">All</option>
                        <option value="new">New</option>
                        <option value="like-new">Like-New</option>
                        <option value="good">Good</option>
                        <option value="fair">Fair</option>
                        <option value="poor">Poor</option>
                    </select>
                </aside>
                <main id="market-grid" class="grid"></main>
            </div>
        </section>

        <section id="view-sell" class="page-view hidden">
            <div class="form-card">
                <h2>Deploy New Listing</h2>
                <form id="sell-form">
                    <input type="text" id="l-name" placeholder="Item Name (max 100)" required>
                    <select id="l-category" required>
                        <option value="Electronics">Electronics</option>
                        <option value="Collectibles">Collectibles</option>
                        <option value="Clothing & Accessories">Apparel</option>
                    </select>
                    <select id="l-condition">
                        <option value="new">New</option>
                        <option value="like-new">Like-New</option>
                        <option value="good">Good</option>
                    </select>
                    <div class="row">
                        <input type="number" id="l-price" placeholder="Price ($)" step="0.01" required>
                        <input type="number" id="l-msrp" placeholder="MSRP ($)" step="0.01">
                    </div>
                    <select id="l-shipping">
                        <option value="paid">Paid Shipping</option>
                        <option value="free">Free</option>
                        <option value="pickup">Pickup</option>
                    </select>
                    <textarea id="l-desc" placeholder="Description (min 10 chars)" required></textarea>
                    <button type="submit">Publish Asset</button>
                </form>
            </div>
        </section>

        <section id="view-profile" class="page-view hidden">
            <div id="user-vault" class="profile-card">
                </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
