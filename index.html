<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="IE=edge" http-equiv="X-UA-Compatible"/>
<meta content="no-cache, no-store, must-revalidate" http-equiv="Cache-Control"/>
<meta content="no-cache" http-equiv="Pragma"/>

<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta content="default-src 'self' https:; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://cdn.jsdelivr.net https://api.web3forms.com https://nominatim.openstreetmap.org; style-src 'self' https://fonts.googleapis.com https://unpkg.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://gotzmuobwuubsugnowxq.supabase.co https://generativelanguage.googleapis.com https://api.web3forms.com https://nominatim.openstreetmap.org https://unpkg.com https://cdn.jsdelivr.net; object-src 'none'; base-uri 'self'; form-action 'self';" http-equiv="Content-Security-Policy"/>
<link as="style" href="style.css?v=20260709" rel="preload"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&amp;family=Rajdhani:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap" media="print" onload="this.media='all'" rel="stylesheet"/>
<noscript><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&amp;family=Rajdhani:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/></noscript>
<title>OBTAINUM — Next-Gen Marketplace</title>
<meta content="OBTAINUM — The techno marketplace for collectors and hobbyists. Fair prices, no scalping." name="description"/>
<!-- Styles -->
<link href="style.css?v=20260709" rel="stylesheet">
<link crossorigin="anonymous" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" referrerpolicy="no-referrer" rel="stylesheet"/>
<!-- External libraries (defer to not block rendering) -->
<script crossorigin="anonymous" defer="" referrerpolicy="no-referrer" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script crossorigin="anonymous" defer="" referrerpolicy="no-referrer" src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Main application script -->
<script defer="" src="script.js?v=20260709"></script>
</link></head>
<body data-page="shop">
<!-- Error Banner -->
<div id="error-banner">OBTAINUM IS EXPERIENCING ISSUES — PLEASE WAIT WHILE WE RESTORE SERVICE</div>
<!-- Toast Container -->
<div id="toast-container"></div>
<!-- ===================== HEADER ===================== -->
<header id="header">
<div class="logo glitch" data-text="OBTAINUM" onclick="navigate('shop')">OBTAINUM</div>
<div class="header-search">
<span class="search-icon"></span>
<input id="search-input" placeholder="Search collectibles, electronics, gear..." type="text"/>
</div>
<nav class="nav-menu" id="nav-menu">
<button class="nav-btn active" id="nav-shop" onclick="navigate('shop')">SHOP</button>
<button class="nav-btn nav-extra" id="nav-create" onclick="navigate('create')">CREATE</button>
<button class="nav-btn nav-extra" id="nav-wishlist" onclick="navigate('wishlist')">WISHLIST</button>
<button class="nav-btn nav-extra" id="nav-profile" onclick="navigateProfile()">PROFILE</button>
<button class="nav-btn nav-extra" id="nav-assistant" onclick="navigate('assistant')">AI ASSISTANT</button>
<button class="nav-btn nav-extra" id="nav-messages" onclick="navigate('messages')">MESSAGES</button>
<button class="nav-btn" id="nav-about" onclick="navigate('about')">ABOUT</button>
<button class="nav-btn" id="nav-contact" onclick="navigate('contact')">CONTACT</button>
<button class="nav-btn nav-extra" id="nav-donate" onclick="navigate('donate')">DONATE</button>
</nav>
<div class="header-actions">
<div id="auth-btn-wrap">
<button class="btn btn-primary btn-sm" onclick="openAuthModal()">LOGIN</button>
</div>
<div class="hidden" id="user-avatar-wrap">
<div class="header-avatar" id="header-avatar" onclick="navigateProfile()">?</div>
</div>
<div class="theme-wrapper">
<button class="theme-toggle" id="theme-toggle"></button>
<div class="theme-toggle-label" id="theme-label">DARK</div>
</div>
</div>
<button class="hamburger" id="hamburger">
<span></span><span></span><span></span>
</button>
</header>
<!-- Mobile Nav Drawer -->
<nav class="mobile-nav" id="mobile-nav">
<button class="nav-btn" onclick="navigate('shop'); closeMobileNav()">SHOP</button>
<button class="nav-btn mobile-nav-extra" onclick="navigate('create'); closeMobileNav()">CREATE</button>
<button class="nav-btn mobile-nav-extra" onclick="navigate('wishlist'); closeMobileNav()">WISHLIST</button>
<button class="nav-btn mobile-nav-extra" onclick="navigate('profile'); closeMobileNav()">PROFILE</button>
<button class="nav-btn mobile-nav-extra" onclick="navigate('assistant'); closeMobileNav()">AI ASSISTANT</button>
<button class="nav-btn mobile-nav-extra" onclick="navigate('messages'); closeMobileNav()">MESSAGES</button>
<button class="nav-btn" onclick="navigate('about'); closeMobileNav()">ABOUT</button>
<button class="nav-btn" onclick="navigate('contact'); closeMobileNav()">CONTACT</button>
<button class="nav-btn mobile-nav-extra" onclick="navigate('donate'); closeMobileNav()">DONATE</button>
</nav>
<!-- ===================== APP PAGES ===================== -->
<main id="app">
  <!-- Page content will be loaded here dynamically -->
</main>

<!-- ===================== AUTH MODAL ===================== -->
<div class="modal-overlay" id="auth-modal" onclick="closeOnOverlay(event, 'auth-modal')">
  <div class="modal"><button class="modal-close" onclick="closeModal('auth-modal')">×</button>
    <div class="modal-logo">OBTAINUM</div><div class="modal-tagline">Enter the marketplace</div>
    <div class="modal-tabs"><button class="modal-tab active" id="tab-login" onclick="switchAuthTab('login')">LOGIN</button><button class="modal-tab" id="tab-register" onclick="switchAuthTab('register')">REGISTER</button></div>
    <div id="auth-login"><form class="auth-form" onsubmit="handleLogin(event)"><button type="button" class="btn btn-outline w-full" onclick="signInWithGoogle()">CONTINUE WITH GOOGLE</button><div class="auth-divider"><span>OR</span></div><input class="form-input" id="login-email" type="email" placeholder="Email" required=""><input class="form-input" id="login-pass" type="password" placeholder="Password" required=""><div id="login-error" class="auth-error"></div><button type="submit" class="btn btn-primary btn-lg w-full" id="login-btn">LOGIN</button></form></div>
    <div id="auth-register" class="hidden"><form class="auth-form" onsubmit="handleRegister(event)"><button type="button" class="btn btn-outline w-full" onclick="signInWithGoogle()">CONTINUE WITH GOOGLE</button><div class="auth-divider"><span>OR</span></div><input class="form-input" id="reg-username" placeholder="Username" required=""><input class="form-input" id="reg-email" type="email" placeholder="Email" required=""><input class="form-input" id="reg-pass" type="password" placeholder="Password" required=""><div id="register-error" class="auth-error"></div><button type="submit" class="btn btn-primary btn-lg w-full" id="register-btn">CREATE ACCOUNT</button></form></div>
  </div>
</div>

<!-- Report Bug Modal -->
<div class="modal-overlay" id="report-modal" onclick="closeOnOverlay(event, 'report-modal')">
  <div class="modal" style="max-width:500px;"><button class="modal-close" onclick="closeModal('report-modal')">×</button>
    <div class="modal-logo" style="font-size:1.1rem;">Report a Bug</div>
    <form onsubmit="submitBugReport(event)">
      <div class="form-group">
        <input class="form-input" id="bug-title" placeholder="Bug title" required="">
      </div>
      <div class="form-group">
        <textarea class="form-input" id="bug-description" rows="4" placeholder="Describe the issue..." required=""></textarea>
      </div>
      <div class="form-group">
        <input class="form-input" id="bug-url" placeholder="Page URL where it happened">
      </div>
      <button type="submit" class="btn btn-primary w-full">Submit Report</button>
    </form>
  </div>
</div>

<!-- Mark Sold Modal -->
<div class="modal-overlay" id="mark-sold-modal" onclick="closeOnOverlay(event, 'mark-sold-modal')">
  <div class="modal" style="max-width:380px;"><button class="modal-close" onclick="closeModal('mark-sold-modal')">×</button>
    <div class="modal-logo" style="font-size:1.1rem;">MARK AS SOLD</div>
    <p>This will mark the listing as sold and remove it from the marketplace.</p>
    <input type="hidden" id="mark-sold-listing-id">
    <button class="btn btn-primary w-full" onclick="confirmMarkSold()">YES, MARK AS SOLD</button>
    <button class="btn btn-ghost w-full" onclick="closeModal('mark-sold-modal')">CANCEL</button>
  </div>
</div>

<!-- AI Route Safety Modal with Map -->
<div class="modal-overlay" id="route-safety-modal" onclick="closeOnOverlay(event, 'route-safety-modal')">
  <div class="modal" style="max-width: 600px; max-height: 90vh; overflow-y: auto;"><button class="modal-close" onclick="closeModal('route-safety-modal')">×</button>
    <div class="modal-logo" style="font-size:1.1rem;">AI Route Safety Check</div>
    <div id="route-safety-content"></div>
  </div>
</div>

</body>
</html>
